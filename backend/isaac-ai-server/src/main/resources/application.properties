spring.application.name=isaac-ai-server

server.port=8080

spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model=llama3.2:3b
spring.ai.ollama.chat.options.temperature=0.5
spring.ai.ollama.chat.options.num-ctx=4096

spring.datasource.url=jdbc:postgresql://localhost:5433/isaac_ai
spring.datasource.username=isaac_ai
spring.datasource.password=isaac_ai_dev

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

logging.level.org.flywaydb=DEBUG
logging.level.org.springframework.boot.autoconfigure.flyway=DEBUG
logging.level.com.zaxxer.hikari=DEBUG