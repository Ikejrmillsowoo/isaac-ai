services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: isaac-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: isaac_ai
      POSTGRES_USER: isaac_ai
      POSTGRES_PASSWORD: local_dev_password
    ports:
      - "5432:5432"
    volumes:
      - isaac_ai_postgres_data:/var/lib/postgresql/data

volumes:
  isaac_ai_postgres_data: